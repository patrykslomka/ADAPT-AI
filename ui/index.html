<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADAPT-AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2d3148;
    --accent: #4f8ef7;
    --accent-dim: #1e3a6e;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --radius: 8px;
    --font: system-ui, -apple-system, sans-serif;
    --mono: 'Courier New', monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font);
         font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
  header .status { font-size: 12px; color: var(--text-dim); margin-left: auto; }
  header .status span { color: var(--green); }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
          display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow-y: auto; }
  aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);
             margin-bottom: 4px; }

  select, button {
    width: 100%; padding: 8px 10px; border-radius: var(--radius); font-size: 13px;
    font-family: var(--font); cursor: pointer;
  }
  select { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  select:focus { outline: 2px solid var(--accent); }

  .patient-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
                  padding: 10px; font-size: 12px; line-height: 1.6; display: none; }
  .patient-card.visible { display: block; }
  .patient-card .label { color: var(--text-dim); }
  .patient-card .allergy { color: var(--red); font-weight: 600; }

  .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--text-dim);
               margin-top: auto; }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* ── Agent status ── */
  .agents { display: flex; flex-direction: column; gap: 6px; }
  .agent { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
           padding: 8px 10px; font-size: 12px; display: flex; justify-content: space-between; }
  .agent .name { color: var(--text-dim); }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
  .badge.approved { background: #052e16; color: var(--green); }
  .badge.warning  { background: #451a03; color: var(--yellow); }
  .badge.rejected { background: #2d0e0e; color: var(--red); }
  .badge.pending  { background: var(--surface); color: var(--text-dim); }

  /* ── Main chat ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .msg { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .msg .bubble { padding: 10px 14px; border-radius: var(--radius); line-height: 1.6; white-space: pre-wrap; }
  .msg.user .bubble { background: var(--accent-dim); border: 1px solid var(--accent); }
  .msg.assistant .bubble { background: var(--surface); border: 1px solid var(--border); }

  .msg .meta { font-size: 11px; color: var(--text-dim); }
  .msg.user .meta { text-align: right; }

  .msg .bubble.rejected { border-color: var(--red); background: #2d0e0e; }
  .msg .bubble h3 { font-size: 15px; margin: 10px 0 4px; color: var(--accent); }
  .msg .bubble h4 { font-size: 13px; margin: 8px 0 4px; color: var(--text); }
  .msg .bubble ul { margin: 6px 0 6px 18px; }
  .msg .bubble li { margin: 2px 0; }
  .msg .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .msg .bubble strong { color: #fff; }

  /* ── Meta bar ── */
  .meta-bar { padding: 6px 20px; background: var(--surface); border-top: 1px solid var(--border);
              font-size: 11px; color: var(--text-dim); display: flex; gap: 20px; flex-shrink: 0; }
  .meta-bar span { color: var(--text); }

  /* ── Input ── */
  .input-row { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border);
               display: flex; gap: 10px; flex-shrink: 0; }
  #query { flex: 1; padding: 10px 14px; border-radius: var(--radius); background: var(--bg);
           color: var(--text); border: 1px solid var(--border); font-size: 14px; font-family: var(--font);
           resize: none; height: 42px; }
  #query:focus { outline: 2px solid var(--accent); }
  #send { width: auto; padding: 0 20px; background: var(--accent); color: #fff; border: none;
          font-weight: 600; border-radius: var(--radius); }
  #send:hover { background: #3a7ce8; }
  #send:disabled { background: var(--border); cursor: not-allowed; }

  /* ── Empty state ── */
  .empty { flex: 1; display: flex; align-items: center; justify-content: center;
           color: var(--text-dim); font-size: 13px; text-align: center; }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>ADAPT-AI</h1>
  <div id="header-status" class="status">connecting…</div>
</header>

<div class="layout">
  <aside>
    <div>
      <h2>Domain</h2>
      <select id="domain-select">
        <option value="healthcare">Healthcare</option>
        <option value="legal">Legal</option>
        <option value="finance">Finance</option>
      </select>
    </div>

    <div id="patient-section">
      <h2>Patient</h2>
      <select id="patient-select"><option value="">Loading…</option></select>
      <div id="patient-card" class="patient-card"></div>
    </div>

    <div>
      <h2>Agents</h2>
      <div class="agents">
        <div class="agent"><span class="name">Primary</span><span id="ag-primary" class="badge pending">—</span></div>
        <div class="agent"><span class="name">Compliance</span><span id="ag-compliance" class="badge pending">—</span></div>
        <div class="agent"><span class="name">Quality</span><span id="ag-quality" class="badge pending">—</span></div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearChat()">Clear chat</button>
  </aside>

  <main>
    <div id="messages"><div class="empty">Select a patient and ask a clinical question.</div></div>
    <div class="meta-bar" id="meta-bar" style="display:none">
      RAT: <span id="m-rat">—</span> &nbsp;|&nbsp;
      Revisions: <span id="m-rev">—</span> &nbsp;|&nbsp;
      Time: <span id="m-time">—</span>
    </div>
    <div class="input-row">
      <textarea id="query" placeholder="Ask a clinical question…" rows="1"></textarea>
      <button id="send" onclick="sendQuery()">Send</button>
    </div>
  </main>
</div>

<script>
const API = '';  // same origin
let sessionId = crypto.randomUUID();
let patients = [];

// ── Boot ──────────────────────────────────────────────────────────────────────

async function boot() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('header-status').innerHTML =
      `pipeline: <span>${d.pipeline}</span>`;
  } catch {
    document.getElementById('header-status').textContent = 'server unreachable';
  }
  await loadPatients();
}

async function loadPatients() {
  const sel = document.getElementById('patient-select');
  try {
    const r = await fetch(`${API}/patients`);
    patients = await r.json();
    sel.innerHTML = '<option value="">No patient selected</option>' +
      patients.map(p =>
        `<option value="${p.patient_id}">${p.patient_id} — ${p.age}y ${p.gender} — ${p.chief_complaint}</option>`
      ).join('');
  } catch {
    sel.innerHTML = '<option value="">Failed to load patients</option>';
  }
}

// ── Domain toggle ─────────────────────────────────────────────────────────────

document.getElementById('domain-select').addEventListener('change', function() {
  const isHealthcare = this.value === 'healthcare';
  document.getElementById('patient-section').style.display = isHealthcare ? '' : 'none';
  updatePlaceholder();
});

function updatePlaceholder() {
  const domain = document.getElementById('domain-select').value;
  const placeholders = {
    healthcare: 'Ask a clinical question…',
    legal: 'Ask a legal question…',
    finance: 'Ask a finance question…',
  };
  document.getElementById('query').placeholder = placeholders[domain] || 'Enter query…';
}

// ── Patient card ──────────────────────────────────────────────────────────────

document.getElementById('patient-select').addEventListener('change', function() {
  const card = document.getElementById('patient-card');
  const pid = this.value;
  if (!pid) { card.className = 'patient-card'; return; }

  const p = patients.find(x => x.patient_id === pid);
  if (!p) return;

  card.innerHTML = `
    <div><span class="label">ID: </span>${p.patient_id}</div>
    <div><span class="label">Age/Sex: </span>${p.age}y ${p.gender}</div>
    <div><span class="label">Complaint: </span>${p.chief_complaint}</div>
    <div><span class="label">Condition: </span>${p.suspected_condition || '—'}</div>
  `;
  card.className = 'patient-card visible';
});

// ── Send query ────────────────────────────────────────────────────────────────

document.getElementById('query').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

async function sendQuery() {
  const domain = document.getElementById('domain-select').value;
  const patientId = document.getElementById('patient-select').value;
  const queryEl = document.getElementById('query');
  const text = queryEl.value.trim();

  if (!text) return;
  if (domain === 'healthcare' && !patientId) {
    addMessage('assistant', '⚠ Please select a patient first.', 'warning');
    return;
  }

  queryEl.value = '';
  addMessage('user', text);

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';

  resetAgents();

  const body = { query: text, domain, session_id: sessionId };
  if (patientId) body.subject_id = patientId;

  try {
    const r = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      addMessage('assistant', `Error ${r.status}: ${err.detail}`, 'rejected');
      return;
    }

    const d = await r.json();
    addMessage('assistant', d.content, d.status === 'rejected' ? 'rejected' : '');
    updateAgents(d.agent_statuses);
    updateMeta(d.metadata);
  } catch (e) {
    addMessage('assistant', `Network error: ${e.message}`, 'rejected');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function addMessage(role, text, extraClass = '') {
  const container = document.getElementById('messages');
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const body = role === 'assistant' ? renderMarkdown(text) : escapeHtml(text);
  div.innerHTML = `
    <div class="bubble ${extraClass}">${body}</div>
    <div class="meta">${role === 'user' ? 'You' : 'ADAPT-AI'} · ${now()}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Minimal, safe markdown: escape first, then apply a few inline/block rules.
function renderMarkdown(text) {
  let h = escapeHtml(text);
  h = h.replace(/^---+$/gm, '<hr>');
  h = h.replace(/^###\s+(.*)$/gm, '<h4>$1</h4>');
  h = h.replace(/^##\s+(.*)$/gm, '<h3>$1</h3>');
  h = h.replace(/^#\s+(.*)$/gm, '<h3>$1</h3>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[^*])\*(?!\s)([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
  h = h.replace(/^\s*[-*]\s+(.*)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  h = h.replace(/<\/ul>\s*<ul>/g, '');
  return h;
}

function updateAgents(statuses) {
  // agent_statuses is a flat dict of strings: { primary: "approved", compliance: "rejected", ... }
  const map = { primary: 'ag-primary', compliance: 'ag-compliance', quality: 'ag-quality' };
  const badgeClass = { approved: 'approved', warning: 'warning', rejected: 'rejected',
                       skipped: 'pending', error: 'rejected' };
  for (const [key, elId] of Object.entries(map)) {
    const el = document.getElementById(elId);
    const status = statuses?.[key];
    if (!status) continue;
    const s = String(status).toLowerCase();
    el.className = `badge ${badgeClass[s] || 'pending'}`;
    el.textContent = status;
  }
}

function resetAgents() {
  ['ag-primary', 'ag-compliance', 'ag-quality'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'badge pending';
    el.textContent = '—';
  });
}

function updateMeta(meta) {
  if (!meta) return;
  document.getElementById('meta-bar').style.display = '';
  document.getElementById('m-rat').textContent = meta.use_rat ? 'RAT' : 'RAG';
  document.getElementById('m-rev').textContent = meta.revision_count ?? 0;
  document.getElementById('m-time').textContent = meta.response_time ? `${meta.response_time}s` : '—';
}

function clearChat() {
  document.getElementById('messages').innerHTML = '<div class="empty">Select a patient and ask a clinical question.</div>';
  document.getElementById('meta-bar').style.display = 'none';
  resetAgents();
  sessionId = crypto.randomUUID();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

boot();
</script>
</body>
</html>
